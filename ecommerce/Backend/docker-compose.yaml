version: '3.8'
services:
  # Django App
  ecommerce_backend:
   container_name: django
   build: .
   volumes:
    - .:/app
   ports:
    - 8000:8000
   depends_on:
    - ecommerce_db
    - ecommerce_redis
   tty: true  # Add this line to enable pseudo-terminal allocation
    
  # Database (PostgreSQL)
  ecommerce_db:
   image: postgres
   container_name: postgresql
   restart: always
   environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: postgres
   ports:
    - 5432:5432
   volumes:
      - .dbdata:/var/lib/postgresql
  
  # Redis Cache
  ecommerce_redis:
    image: redis
    container_name: redis
    ports:
      - 6379:6379